<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Inquiry received — The Manhattan Monster Bar</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{--black:#0C0C0E;--gold:#C8A44A;--muted:#888899;--white:#F0F0F8;--body:#C8C8D8;--green:#3DBE7A;}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--black);color:var(--body);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center;}
.icon{width:72px;height:72px;border-radius:50%;background:#1A3A28;border:2px solid var(--green);display:flex;align-items:center;justify-content:center;margin:0 auto 28px;}
.icon svg{stroke:var(--green);}
h1{font-family:'Bebas Neue',sans-serif;font-size:52px;letter-spacing:0.04em;color:var(--white);margin-bottom:12px;}
p{font-size:15px;color:var(--muted);max-width:420px;line-height:1.6;margin:0 auto 10px;}
.contact{background:#1C1C22;border:1px solid #36363F;border-radius:8px;padding:18px 24px;margin-top:28px;max-width:380px;}
.contact p{color:var(--body);font-size:14px;}
.contact strong{color:var(--gold);}
.back{display:inline-block;margin-top:32px;font-size:13px;color:var(--muted);text-decoration:none;border-bottom:1px solid #36363F;padding-bottom:2px;}
.back:hover{color:var(--white);}
</style>
</head>
<body>
<div class="icon">
  <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="20 6 9 17 4 12"/>
  </svg>
</div>
<h1>You're on our radar.</h1>
<p>We've received your private event inquiry and will follow up with a full proposal within 24–48 hours.</p>
<div class="contact">
  <p>Questions in the meantime?<br/>
  Email <strong>dan@monsterbar.nyc</strong><br/>
  or call <strong>917-525-3689</strong></p>
</div>
<a class="back" href="/">← Submit another inquiry</a>
</body>
</html>
